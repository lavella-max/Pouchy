<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompet Pelajar ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #fdf2f8; /* pink-50 */
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .transaction-list::-webkit-scrollbar { width: 4px; }
        .transaction-list::-webkit-scrollbar-track { background: transparent; }
        .transaction-list::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex justify-center text-gray-700">

    <!-- Simulasi Tampilan Mobile App -->
    <div id="app-screen" class="w-full max-w-md sm:my-6 sm:rounded-[2rem] sm:shadow-2xl sm:shadow-pink-200 bg-white overflow-hidden flex flex-col relative">
        
        <!-- Header -->
        <div class="px-6 pt-8 pb-6 bg-gradient-to-br from-pink-300 to-purple-300 text-white rounded-b-3xl shadow-lg relative z-10">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Halo, Cantik! ✨</h1>
                    <p class="text-xs text-pink-50 opacity-90 mt-1">Mode Offline • Jangan Lupa Nabung!</p>
                </div>
                <button id="reset-data-btn" class="bg-white/20 hover:bg-white/30 backdrop-blur text-xs font-semibold py-2 px-3 rounded-xl transition-all" title="Hapus Semua">
                    🗑️ Reset
                </button>
            </div>

            <!-- Saldo Utama -->
            <div class="glass-card p-4 rounded-2xl text-gray-800 mt-4 shadow-sm">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Sisa Uang Jajan 👛</p>
                <div id="sisa-uang" class="text-3xl font-bold text-pink-500">Rp 0</div>
            </div>
        </div>

        <!-- Body Content -->
        <div class="flex-grow overflow-y-auto px-6 py-6 space-y-6 pb-24">
            
            <!-- Card Celengan -->
            <div class="bg-teal-50 p-5 rounded-2xl border border-teal-100 shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-sm font-bold text-teal-700 uppercase tracking-wide">Celengan Impian 🐷</h2>
                </div>
                <div id="total-aset-tabungan" class="text-2xl font-bold text-teal-600">Rp 0</div>
            </div>

            <!-- Forms / Actions -->
            <div class="space-y-4">
                <h3 class="font-bold text-gray-800 border-b-2 border-pink-100 pb-2">Catat Keuanganmu 📝</h3>
                
                <!-- Uang Masuk -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h4 class="text-sm font-bold text-green-500 mb-3 flex items-center gap-2"><span>💸</span> Dapet Uang</h4>
                    <form id="form-pemasukan" class="space-y-2">
                        <input type="text" id="desc-pemasukan" placeholder="Dari mana? (ex: Uang saku Papa)" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-green-200 outline-none">
                        <div class="flex gap-2">
                            <input type="number" id="jumlah-pemasukan" placeholder="0" min="0" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-green-200 outline-none font-mono">
                            <button type="submit" class="bg-green-400 text-white px-4 py-2 rounded-xl font-bold hover:bg-green-500 transition-transform active:scale-95">+</button>
                        </div>
                    </form>
                    <ul id="list-pemasukan" class="mt-3 space-y-2 max-h-32 overflow-y-auto transaction-list"></ul>
                </div>

                <!-- Jajan -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h4 class="text-sm font-bold text-pink-500 mb-3 flex items-center gap-2"><span>🛍️</span> Buat Jajan / Main</h4>
                    <form id="form-pengeluaran" class="space-y-2">
                        <input type="text" id="desc-pengeluaran" placeholder="Beli apa? (ex: Boba, Skincare)" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none">
                        <div class="flex gap-2">
                            <input type="number" id="jumlah-pengeluaran" placeholder="0" min="0" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-pink-200 outline-none font-mono">
                            <button type="submit" class="bg-pink-400 text-white px-4 py-2 rounded-xl font-bold hover:bg-pink-500 transition-transform active:scale-95">-</button>
                        </div>
                    </form>
                    <ul id="list-pengeluaran" class="mt-3 space-y-2 max-h-32 overflow-y-auto transaction-list"></ul>
                </div>

                <!-- Nabung -->
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <h4 class="text-sm font-bold text-teal-500 mb-3 flex items-center gap-2"><span>🏦</span> Celengan</h4>
                    <form id="form-tabungan" class="space-y-3">
                        <div class="flex p-1 bg-gray-50 rounded-xl">
                            <label class="flex-1 text-center cursor-pointer py-1.5 rounded-lg transition-all has-[:checked]:bg-teal-400 has-[:checked]:text-white text-gray-400">
                                <input type="radio" name="tipe-tabungan" value="setor" checked class="hidden">
                                <span class="text-xs font-bold">Nabung Yuk</span>
                            </label>
                            <label class="flex-1 text-center cursor-pointer py-1.5 rounded-lg transition-all has-[:checked]:bg-orange-400 has-[:checked]:text-white text-gray-400">
                                <input type="radio" name="tipe-tabungan" value="tarik" class="hidden">
                                <span class="text-xs font-bold">Ambil Dulu</span>
                            </label>
                        </div>
                        <input type="text" id="desc-tabungan" placeholder="Untuk apa? (ex: Tiket Konser)" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-teal-200 outline-none">
                        <div class="flex gap-2">
                            <input type="number" id="jumlah-tabungan" placeholder="0" min="0" required class="w-full px-4 py-2 text-sm border-none bg-gray-50 rounded-xl focus:ring-2 focus:ring-teal-200 outline-none font-mono">
                            <button type="submit" class="bg-teal-400 text-white px-4 py-2 rounded-xl font-bold hover:bg-teal-500 transition-transform active:scale-95">Ok</button>
                        </div>
                    </form>
                    <ul id="list-tabungan" class="mt-3 space-y-2 max-h-32 overflow-y-auto transaction-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Menggunakan key berbeda agar tidak bentrok dengan web sebelumnya jika di localhost yang sama
        const STORAGE_KEY = 'keuangan_pelajar_v1';
        let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { pemasukan: [], pengeluaran: [], tabungan: [] };

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function autoMultiply(input) {
            try {
                let value = parseFloat(input.value);
                if (!isNaN(value) && value > 0 && value < 10000) input.value = value * 1000;
            } catch (e) {}
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
            updateUI();
        }

        function updateUI() {
            renderList('pemasukan', userData.pemasukan);
            renderList('pengeluaran', userData.pengeluaran);
            renderList('tabungan', userData.tabungan);
            updateSummary();
        }

        function renderList(type, transactions) {
            const list = document.getElementById(`list-${type}`);
            list.innerHTML = '';
            
            const sorted = [...transactions].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (sorted.length === 0) {
                list.innerHTML = '<li class="text-gray-300 text-[10px] text-center italic py-2">Belum ada catatan nih~</li>';
                return;
            }

            sorted.forEach((tx) => {
                const li = document.createElement('li');
                let amountColor = type === 'pemasukan' ? 'text-green-500' : (type === 'pengeluaran' ? 'text-pink-500' : (tx.amount < 0 ? 'text-orange-500' : 'text-teal-500'));
                let icon = type === 'pemasukan' ? '💸' : (type === 'pengeluaran' ? '🛍️' : (tx.amount < 0 ? '📤' : '📥'));

                li.className = `flex justify-between items-center bg-gray-50/50 p-2.5 rounded-xl text-sm`;
                li.innerHTML = `
                    <div class="flex items-center gap-2 overflow-hidden flex-grow mr-2">
                        <span class="text-lg leading-none">${icon}</span>
                        <div class="overflow-hidden">
                            <div class="font-semibold text-gray-700 truncate">${tx.description}</div>
                            <div class="text-[9px] text-gray-400 mt-0.5">${new Date(tx.timestamp).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end flex-shrink-0">
                        <span class="font-bold font-mono ${amountColor}">${formatRupiah(tx.amount)}</span>
                        <button class="delete-btn text-gray-300 hover:text-red-400 text-[10px] mt-1 cursor-pointer transition-colors" data-id="${tx.id}" data-type="${type}">hapus</button>
                    </div>
                `;
                list.appendChild(li);
            });

            list.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if(confirm('Yakin mau hapus catatan ini? 🥺')) {
                        const targetId = e.target.getAttribute('data-id');
                        const targetType = e.target.getAttribute('data-type');
                        userData[targetType] = userData[targetType].filter(item => item.id !== targetId);
                        saveData();
                    }
                });
            });
        }

        function updateSummary() {
            const totalPemasukan = userData.pemasukan.reduce((acc, curr) => acc + parseFloat(curr.amount), 0);
            const totalPengeluaran = userData.pengeluaran.reduce((acc, curr) => acc + parseFloat(curr.amount), 0);
            const totalTabungan = userData.tabungan.reduce((acc, curr) => acc + parseFloat(curr.amount), 0);
            
            document.getElementById('sisa-uang').textContent = formatRupiah(totalPemasukan - totalPengeluaran);
            document.getElementById('total-aset-tabungan').textContent = formatRupiah(totalTabungan);
        }

        function setupForm(type) {
            const form = document.getElementById(`form-${type}`);
            const amountInput = form.querySelector(`input[type="number"]`);
            
            amountInput.addEventListener('blur', (e) => autoMultiply(e.target));

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const descInput = form.querySelector(`input[type="text"]`);
                let amount = parseFloat(amountInput.value);
                
                if (!descInput.value || isNaN(amount) || amount <= 0) return alert('Isi yang bener dong! 😡');
                if (type === 'tabungan' && form.querySelector('input[value="tarik"]').checked) amount *= -1;

                const newData = {
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
                    description: descInput.value, 
                    amount: amount, 
                    timestamp: new Date().toISOString()
                };

                userData[type].push(newData);
                saveData();
                
                descInput.value = ''; 
                amountInput.value = ''; 
                descInput.focus();
            });
        }

        document.getElementById('reset-data-btn').addEventListener('click', () => {
            if(confirm('Yakin mau hapus SEMUA data? Ga bisa balik lagi lho! 😭')) {
                localStorage.removeItem(STORAGE_KEY);
                userData = { pemasukan: [], pengeluaran: [], tabungan: [] };
                updateUI();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            setupForm('pemasukan');
            setupForm('pengeluaran');
            setupForm('tabungan');
            updateUI();
        });
    </script>
</body>
</html>
